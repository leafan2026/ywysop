<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊为伊 SOP 帮助中心</title>
<style>
  :root {
    --ink: #1d1d1f;
    --ink-80: #333333;
    --ink-48: #6e6e73;
    --canvas: #ffffff;
    --parchment: #f5f5f7;
    --surface-black: #000000;
    --hairline: #e0e0e0;
    --primary: #0066cc;
    --r-sm: 8px;
    --r-md: 11px;
    --font-display: "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-text: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: var(--font-text);
    color: var(--ink);
    background: var(--canvas);
    font-size: 17px;
    line-height: 1.47;
    letter-spacing: -0.374px;
  }
  .global-nav {
    position: sticky;
    top: 0;
    z-index: 10;
    height: 44px;
    background: var(--surface-black);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
  }
  .hero {
    padding: 88px 80px 56px;
    border-bottom: 1px solid var(--hairline);
  }
  .hero-inner,
  .section-inner {
    max-width: 920px;
    margin: 0 auto;
  }
  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-48);
    margin-bottom: 12px;
  }
  h1 {
    font-family: var(--font-display);
    font-size: 44px;
    line-height: 1.08;
    letter-spacing: -0.018em;
    font-weight: 600;
    margin-bottom: 17px;
  }
  .lede {
    max-width: 720px;
    font-size: 19px;
    line-height: 1.42;
    color: var(--ink-48);
  }
  .section {
    padding: 64px 80px;
    background: var(--parchment);
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
  }
  .card {
    display: block;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-md);
    padding: 24px;
    color: inherit;
    text-decoration: none;
    transition: transform 0.18s ease, border-color 0.18s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(0, 102, 204, 0.35);
    text-decoration: none;
  }
  .card h2 {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .card p {
    color: var(--ink-48);
    margin-bottom: 18px;
  }
  .card span {
    color: var(--primary);
    font-size: 15px;
  }
  .note {
    margin-top: 24px;
    padding: 16px 18px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-sm);
    color: var(--ink-80);
    font-size: 15px;
  }
  @media (max-width: 760px) {
    .hero,
    .section {
      padding-left: 22px;
      padding-right: 22px;
    }
    h1 { font-size: 34px; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<nav class="global-nav">伊为伊 SOP 帮助中心</nav>

<main>
  <section class="hero">
    <div class="hero-inner">
      <div class="eyebrow">SOP Help Center</div>
      <h1>订单、售后与库存流程的统一入口</h1>
      <p class="lede">这里保留现有 SOP HTML 的最终视觉样式，只把内容维护从整页 HTML 改为 HAP 内容源和发布快照。</p>
    </div>
  </section>

  <section class="section">
    <div class="section-inner">
      <div class="cards">
        <a class="card" href="./订单全流程SOP.html">
          <h2>订单全流程 SOP</h2>
          <p>从订单创建、审核、库存判定、采购、出库准备到商品出库。</p>
          <span>打开文档 →</span>
        </a>
        <a class="card" href="./售后标准工作流程.html">
          <h2>售后标准工作流程</h2>
          <p>覆盖调货前、调货后、发货后三类售后处理路径。</p>
          <span>打开文档 →</span>
        </a>
      </div>

      <div class="note">
        当前 HAP 发布状态仍是待核实。正式对外发布前，需要完成公开化审校、截图补齐、字段/视图名称核实和链接确认。
      </div>
    </div>
  </section>
</main>
</body>
</html>
